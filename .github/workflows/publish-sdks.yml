name: Publish SDKs

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/ref to publish from (for example, v0.8.1)'
        required: true
        type: string
      publish_python:
        description: 'Publish Python SDK to PyPI'
        required: false
        type: boolean
        default: false
      publish_npm:
        description: 'Publish TypeScript SDK to npm'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish-pypi:
    name: Publish Python SDK to PyPI
    if: ${{ inputs.publish_python }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set package version from tag
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          export VERSION="${SDK_TAG#v}"
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          path = Path("python/aplane/_version.py")
          text = path.read_text(encoding="utf-8")
          updated, count = re.subn(
              r'(?m)^__version__ = "[^"]+"$',
              f'__version__ = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("failed to update python/aplane/_version.py version")
          path.write_text(updated, encoding="utf-8")
          print(f"Set Python SDK version to {version}")
          PY

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build
        working-directory: python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          skip-existing: true

  publish-npm:
    name: Publish TypeScript SDK to npm
    if: ${{ inputs.publish_npm }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install npm with trusted publishing support
        run: |
          npm install -g npm@11
          npm --version

      - name: Set package version from tag
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${SDK_TAG#v}"
          npm version "$VERSION" --no-git-tag-version
        working-directory: typescript

      - name: Install dependencies
        run: npm ci
        working-directory: typescript

      - name: Build package
        run: npm run build
        working-directory: typescript

      - name: Publish to npm
        env:
          SDK_TAG: ${{ inputs.tag }}
        run: |
          VERSION="${SDK_TAG#v}"
          if npm view "aplane@$VERSION" version >/dev/null 2>&1; then
            echo "aplane@$VERSION already published; skipping"
            exit 0
          fi
          npm publish --provenance --access public
        working-directory: typescript
